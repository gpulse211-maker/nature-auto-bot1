name: Auto Facebook Post

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets
  run: |
    echo "Checking secrets..."
    if [ -z "${{ secrets.FB_PAGE_ID }}" ]; then echo "FB_PAGE_ID MISSING"; fi
    if [ -z "${{ secrets.FB_ACCESS_TOKEN }}" ]; then echo "TOKEN MISSING"; fi
    if [ -z "${{ secrets.PEXELS_API }}" ]; then echo "PEXELS MISSING"; fi
        run: python bot.py
